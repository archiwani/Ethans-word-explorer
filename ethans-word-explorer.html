<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethan's Word Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Comic Sans MS', sans-serif;
      background: #FFF8F0;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
      padding: 32px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header .deco {
      position: absolute;
      opacity: 0.15;
      font-size: 40px;
    }
    .header .deco.d1 { top: 10px; left: 20px; }
    .header .deco.d2 { top: 20px; right: 30px; font-size: 30px; }
    .header .deco.d3 { bottom: 10px; left: 15%; font-size: 24px; }
    .header .deco.d4 { bottom: 15px; right: 20%; font-size: 32px; }
    .header-icon { font-size: 44px; margin-bottom: 6px; }
    .header h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header p {
      margin-top: 6px;
      color: rgba(255,255,255,0.88);
      font-size: 15px;
      font-weight: 600;
    }

    /* Search box */
    .search-wrap {
      max-width: 560px;
      margin: -24px auto 0;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }
    .search-box {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(255,107,107,0.18);
      display: flex;
      align-items: center;
      padding: 8px 8px 8px 18px;
      gap: 10px;
      border: 2px solid rgba(255,107,107,0.2);
    }
    .search-icon { font-size: 20px; }
    #wordInput {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
      font-family: inherit;
      font-weight: 700;
      color: #2D3748;
      background: transparent;
    }
    #searchBtn {
      background: #FF6B6B;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 10px 22px;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      white-space: nowrap;
    }
    #searchBtn:hover { background: #FF5252; }
    #searchBtn:active { transform: scale(0.95); }
    #searchBtn:disabled { background: #ccc; cursor: not-allowed; }

    /* Suggestions */
    .suggestions {
      margin-top: 16px;
      text-align: center;
    }
    .suggestions span {
      font-size: 13px;
      color: #718096;
      font-weight: 600;
    }
    .sug-btn {
      background: #fff;
      border: 1.5px solid #E2E8F0;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #4ECDC4;
      cursor: pointer;
      margin: 3px 4px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .sug-btn:hover { border-color: #4ECDC4; }

    /* Content area */
    .content {
      max-width: 560px;
      margin: 28px auto 0;
      padding: 0 20px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      display: none;
    }
    .loading-spin {
      font-size: 48px;
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p {
      color: #718096;
      font-weight: 700;
      margin-top: 12px;
      font-size: 16px;
    }

    /* Error */
    .error-box {
      background: #FFF5F5;
      border: 2px solid #FED7D7;
      border-radius: 16px;
      padding: 20px 24px;
      text-align: center;
      color: #FF6B6B;
      font-weight: 700;
      font-size: 16px;
      display: none;
    }

    /* Result */
    #result { display: none; flex-direction: column; gap: 16px; }

    /* Word card */
    .word-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      border: 2px solid rgba(255,107,107,0.15);
    }
    .word-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .word-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .word-text h2 {
      font-size: 34px;
      font-weight: 900;
      color: #2D3748;
      line-height: 1.1;
    }
    .word-text .pronunciation {
      font-size: 14px;
      color: #718096;
      font-weight: 600;
      margin-top: 5px;
    }
    .pos-tag {
      display: inline-block;
      background: rgba(167,139,250,0.13);
      color: #A78BFA;
      border: 1.5px solid rgba(167,139,250,0.27);
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 13px;
      font-weight: 600;
    }

    /* Speak buttons */
    .speak-btn {
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s;
      font-size: 17px;
      background: #4ECDC4;
    }
    .speak-btn.big { width: 48px; height: 48px; font-size: 22px; }
    .speak-btn.normal { width: 36px; height: 36px; font-size: 17px; }
    .speak-btn.small { width: 28px; height: 28px; font-size: 13px; }
    .speak-btn.speaking {
      background: #FF6B6B;
      transform: scale(1.15);
      box-shadow: 0 0 0 4px rgba(255,107,107,0.2);
    }

    /* Definition card */
    .def-card {
      background: linear-gradient(135deg, rgba(78,205,196,0.12) 0%, rgba(78,205,196,0.04) 100%);
      border-radius: 20px;
      padding: 22px 26px;
      border: 2px solid rgba(78,205,196,0.25);
    }
    .card-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-label span {
      font-size: 20px;
    }
    .card-label strong {
      font-weight: 800;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .def-card .card-label strong { color: #4ECDC4; }
    .def-text {
      font-size: 17px;
      line-height: 1.65;
      color: #2D3748;
      font-weight: 600;
    }

    /* Examples card */
    .ex-card {
      background: #fff;
      border-radius: 20px;
      padding: 22px 26px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 2px solid rgba(255,230,109,0.5);
    }
    .ex-card .card-label strong { color: #B7791F; }
    .examples-list { display: flex; flex-direction: column; gap: 10px; }
    .example-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-radius: 12px;
      padding: 12px 14px;
    }
    .example-item.even {
      background: #FFFDF0;
      border: 1.5px solid rgba(255,230,109,0.5);
    }
    .example-item.odd {
      background: #F0FFFE;
      border: 1.5px solid rgba(78,205,196,0.3);
    }
    .ex-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .ex-text {
      font-size: 15px;
      line-height: 1.6;
      color: #2D3748;
      font-weight: 600;
      flex: 1;
    }

    /* Reset button */
    .reset-wrap { text-align: center; padding-top: 4px; }
    .reset-btn {
      background: transparent;
      border: 2px solid #E2E8F0;
      border-radius: 20px;
      padding: 8px 22px;
      font-size: 14px;
      font-weight: 700;
      color: #718096;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .reset-btn:hover { border-color: #CBD5E0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="deco d1">⭐</span>
    <span class="deco d2">📖</span>
    <span class="deco d3">✨</span>
    <span class="deco d4">🌟</span>
    <div class="header-icon">📚</div>
    <h1>Ethan's Word Explorer</h1>
    <p>Search any word and discover its meaning!</p>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="wordInput" type="text" placeholder="Type a word..." autocomplete="off" />
      <button id="searchBtn">Search →</button>
    </div>
    <div class="suggestions" id="suggestions">
      <span>Try: </span>
      <button class="sug-btn" onclick="quickSearch('curious')">curious</button>
      <button class="sug-btn" onclick="quickSearch('enormous')">enormous</button>
      <button class="sug-btn" onclick="quickSearch('brave')">brave</button>
      <button class="sug-btn" onclick="quickSearch('adventure')">adventure</button>
      <button class="sug-btn" onclick="quickSearch('discover')">discover</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="loading" id="loading">
      <div class="loading-spin">🌀</div>
      <p>Looking it up...</p>
    </div>

    <div class="error-box" id="errorBox">😅 Oops! Something went wrong. Please try again.</div>

    <div id="result">
      <!-- Word card -->
      <div class="word-card">
        <div class="word-top">
          <div class="word-left">
            <button class="speak-btn big" id="speakWord" onclick="speakText(currentWord)">🔊</button>
            <div class="word-text">
              <h2 id="displayWord"></h2>
              <div class="pronunciation" id="displayPron"></div>
            </div>
          </div>
          <span class="pos-tag" id="displayPos"></span>
        </div>
      </div>

      <!-- Definition card -->
      <div class="def-card">
        <div class="card-label">
          <span>💡</span>
          <strong>Definition</strong>
        </div>
        <p class="def-text" id="displayDef"></p>
      </div>

      <!-- Examples card -->
      <div class="ex-card">
        <div class="card-label">
          <span>✏️</span>
          <strong>Example Sentences</strong>
        </div>
        <div class="examples-list" id="displayExamples"></div>
      </div>

      <!-- Reset -->
      <div class="reset-wrap">
        <button class="reset-btn" onclick="resetSearch()">🔍 Search another word</button>
      </div>
    </div>
  </div>

  <script>
    const EX_COLORS = ['#FF6B6B','#4ECDC4','#A78BFA','#68D391','#F6AD55'];
    let currentWord = '';

    document.getElementById('wordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchWord();
    });
    document.getElementById('searchBtn').addEventListener('click', searchWord);

    function quickSearch(word) {
      document.getElementById('wordInput').value = word;
      searchWord();
    }

    function speakText(text, btn) {
      if (!text) return;
      speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 0.85;
      utt.pitch = 1.1;
      if (btn) {
        btn.classList.add('speaking');
        utt.onend = () => btn.classList.remove('speaking');
        utt.onerror = () => btn.classList.remove('speaking');
      }
      speechSynthesis.speak(utt);
    }

    async function searchWord() {
      const word = document.getElementById('wordInput').value.trim();
      if (!word) return;

      setLoading(true);
      document.getElementById('suggestions').style.display = 'none';

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: 'You are a friendly dictionary for a child in 2nd grade with strong English skills. Always respond ONLY with valid JSON — no markdown, no backticks, no extra text.',
            messages: [{
              role: 'user',
              content: `Look up the word: "${word}"\n\nReturn ONLY a JSON object:\n{\n  "word": "correct spelling",\n  "partOfSpeech": "noun / verb / adjective / etc.",\n  "pronunciation": "simple phonetic like EL-uh-fant",\n  "ipa": "/ɛl.ɪ.fənt/",\n  "definition": "Clear, interesting definition for a smart 7-8 year old.",\n  "examples": ["Sentence 1.","Sentence 2.","Sentence 3.","Sentence 4.","Sentence 5."]\n}`
            }]
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'API error');

        const raw = data.content[0].text.trim().replace(/^```json\s*/i,'').replace(/```\s*$/,'').trim();
        const d = JSON.parse(raw);
        showResult(d);
      } catch(e) {
        console.error(e);
        setError(true);
      }
      setLoading(false);
    }

    function showResult(d) {
      currentWord = d.word;
      document.getElementById('displayWord').textContent = d.word;
      document.getElementById('displayPron').textContent =
        (d.pronunciation ? '🗣 ' + d.pronunciation : '') +
        (d.ipa ? '  ·  ' + d.ipa : '');
      document.getElementById('displayPos').textContent = d.partOfSpeech;
      document.getElementById('displayDef').textContent = d.definition;

      const list = document.getElementById('displayExamples');
      list.innerHTML = '';
      (d.examples || []).forEach((ex, i) => {
        const item = document.createElement('div');
        item.className = 'example-item ' + (i % 2 === 0 ? 'even' : 'odd');

        const num = document.createElement('div');
        num.className = 'ex-num';
        num.style.background = EX_COLORS[i];
        num.textContent = i + 1;

        const txt = document.createElement('p');
        txt.className = 'ex-text';
        txt.textContent = ex;

        const btn = document.createElement('button');
        btn.className = 'speak-btn small';
        btn.textContent = '🔊';
        btn.title = 'Listen';
        btn.onclick = () => speakText(ex, btn);

        item.appendChild(num);
        item.appendChild(txt);
        item.appendChild(btn);
        list.appendChild(item);
      });

      document.getElementById('result').style.display = 'flex';
      document.getElementById('errorBox').style.display = 'none';
    }

    function setLoading(on) {
      document.getElementById('loading').style.display = on ? 'block' : 'none';
      document.getElementById('searchBtn').disabled = on;
      document.getElementById('searchBtn').textContent = on ? '...' : 'Search →';
      if (on) {
        document.getElementById('result').style.display = 'none';
        document.getElementById('errorBox').style.display = 'none';
      }
    }

    function setError(on) {
      document.getElementById('errorBox').style.display = on ? 'block' : 'none';
    }

    function resetSearch() {
      document.getElementById('result').style.display = 'none';
      document.getElementById('wordInput').value = '';
      document.getElementById('suggestions').style.display = 'block';
      document.getElementById('wordInput').focus();
      currentWord = '';
    }
  </script>
</body>
</html>
